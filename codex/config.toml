model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"
web_search = "live"
approval_policy = "never"
sandbox_mode = "danger-full-access"
notify = ["sh", "-lc", "bell; test -d .jj && jj st > /dev/null 2>&1 || true"]
commit_attribution = ""

[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir"]
theme = "nord"

[notice]
hide_rate_limit_model_nudge = true
fast_default_opt_out = true

[projects."/home/odsod/Code"]
trust_level = "trusted"

[projects."/home/odsod/Workspaces"]
trust_level = "trusted"

[projects."/home/odsod/Code/github.com/odsod/machine"]
trust_level = "trusted"

[[hooks.PostToolUse]]
matcher = "Write|Edit|apply_patch"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "jq -r '.tool_input.file_path // .tool_input.path // empty' | { read -r f; case \"$f\" in *.md|*.yaml|*.yml|*.json|*.toml) oxfmt --write \"$f\" ;; esac; } 2>/dev/null || true"
