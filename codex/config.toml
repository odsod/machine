model = "gpt-5.4"
model_reasoning_effort = "medium"
personality = "pragmatic"
web_search = "live"
approval_policy = "never"
sandbox_mode = "danger-full-access"
notify = ["sh", "-lc", "printf '\\a' > /dev/tty; test -d .jj && jj st > /dev/null 2>&1 || true"]
commit_attribution = ""

[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir"]

[notice]
hide_rate_limit_model_nudge = true

[projects."/home/odsod/Code"]
trust_level = "trusted"

[projects."/home/odsod/Workspaces"]
trust_level = "trusted"

[projects."/home/odsod/Code/github.com/odsod/machine"]
trust_level = "trusted"
